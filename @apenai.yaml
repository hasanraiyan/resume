openapi: 3.1.0
info:
  title: Raiyan Portfolio API
  description: Public API endpoints for Raiyan's portfolio website, including projects, articles, search, chat, and analytics.
  version: 1.0.0
  contact:
    name: Raiyan
    url: https://hasanraiyan.vercel.app

servers:
  - url: https://hasanraiyan.vercel.app
    description: Production server
  - url: http://localhost:3000
    description: Development server

paths:
  /api/chat:
    post:
      summary: Interact with AI chatbot
      description: Send a message to the AI chatbot that can access portfolio data dynamically
      operationId: chatWithAI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userMessage
                - sessionId
              properties:
                userMessage:
                  type: string
                  description: The user's message to send to the chatbot
                  example: "What projects have you worked on?"
                chatHistory:
                  type: array
                  description: Previous conversation messages
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                  default: []
                sessionId:
                  type: string
                  description: Unique session identifier
                  example: "abc123"
                path:
                  type: string
                  description: Current page path context
                  example: "/projects"
                  default: "/"
      responses:
        '200':
          description: Streaming AI response
          content:
            text/plain:
              schema:
                type: string
                description: Streaming text response with JSON packets
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable - chatbot disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/search:
    get:
      summary: Search portfolio content
      description: Perform fuzzy search across projects and articles
      operationId: searchPortfolio
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Search query string
          example: "react portfolio"
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [project, article]
                        id:
                          type: string
                        title:
                          type: string
                        slug:
                          type: string
                        excerpt:
                          type: string
                        url:
                          type: string
                        score:
                          type: number
                          minimum: 0
                          maximum: 1
                        tags:
                          type: array
                          items:
                            type: string
                        category:
                          type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects:
    get:
      summary: List projects
      description: Get a list of projects with optional filtering
      operationId: listProjects
      parameters:
        - name: featured
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Filter for featured projects only
        - name: category
          in: query
          schema:
            type: string
          description: Filter by project category
          example: "web-development"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Maximum number of projects to return
          example: 5
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects/{slug}:
    get:
      summary: Get project details
      description: Get detailed information about a specific project
      operationId: getProject
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug or MongoDB ObjectId
          example: "luxury-fashion-store"
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  project:
                    $ref: '#/components/schemas/ProjectDetail'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects/{slug}/likes:
    get:
      summary: Get project engagement
      description: Get likes and claps count for a project
      operationId: getProjectLikes
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
          example: "luxury-fashion-store"
      responses:
        '200':
          description: Engagement data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  likes:
                    type: integer
                    example: 42
                  claps:
                    type: integer
                    example: 15
                  userEngagement:
                    type: object
                    properties:
                      liked:
                        type: boolean
                        example: false
                      clapped:
                        type: boolean
                        example: true
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update project engagement
      description: Like or clap a project (rate limited)
      operationId: updateProjectLikes
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug
          example: "luxury-fashion-store"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
                - type
              properties:
                action:
                  type: string
                  enum: [increment, decrement]
                  example: "increment"
                type:
                  type: string
                  enum: [like, clap]
                  example: "like"
      responses:
        '200':
          description: Engagement updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  likes:
                    type: integer
                    example: 43
        '400':
          description: Invalid action or type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already engaged with this content
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Already engaged with this content"
                  alreadyEngaged:
                    type: boolean
                    example: true
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/articles/{slug}/likes:
    get:
      summary: Get article engagement
      description: Get likes and claps count for an article
      operationId: getArticleLikes
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Article slug
          example: "react-performance-guide"
      responses:
        '200':
          description: Engagement data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  likes:
                    type: integer
                    example: 28
                  claps:
                    type: integer
                    example: 12
                  userEngagement:
                    type: object
                    properties:
                      liked:
                        type: boolean
                        example: true
                      clapped:
                        type: boolean
                        example: false
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update article engagement
      description: Like or clap an article (rate limited)
      operationId: updateArticleLikes
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Article slug
          example: "react-performance-guide"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
                - type
              properties:
                action:
                  type: string
                  enum: [increment, decrement]
                  example: "increment"
                type:
                  type: string
                  enum: [like, clap]
                  example: "clap"
      responses:
        '200':
          description: Engagement updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  claps:
                    type: integer
                    example: 13
        '400':
          description: Invalid action or type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already engaged with this content
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Already engaged with this content"
                  alreadyEngaged:
                    type: boolean
                    example: true
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/health:
    get:
      summary: Health check
      description: Check if the API is running
      operationId: healthCheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-01T00:00:00.000Z"

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error message"
        error:
          type: string
          example: "Detailed error description"

    Project:
      type: object
      properties:
        id:
          type: string
          description: Project unique identifier
          example: "507f1f77bcf86cd799439011"
        _id:
          type: string
          description: MongoDB ObjectId as string
          example: "507f1f77bcf86cd799439011"
        title:
          type: string
          example: "Luxury Fashion Store"
        slug:
          type: string
          example: "luxury-fashion-store"
        description:
          type: string
          example: "A modern e-commerce platform for luxury fashion"
        category:
          type: string
          example: "e-commerce"
        featured:
          type: boolean
          example: true
        links:
          type: object
          properties:
            live:
              type: string
              example: "https://example.com"
            github:
              type: string
              example: "https://github.com/user/repo"
        tags:
          type: array
          items:
            type: string
          example: ["React", "Next.js", "Stripe"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            tagline:
              type: string
              example: "Elegant shopping experience"
            details:
              type: string
              example: "Full project description with technical details..."
            contributors:
              type: array
              items:
                type: object
                properties:
                  contributor:
                    type: object
                    properties:
                      name:
                        type: string
                      avatar:
                        type: string
                      role:
                        type: string
                  order:
                    type: integer
            likes:
              type: integer
              example: 42
            claps:
              type: integer
              example: 15

